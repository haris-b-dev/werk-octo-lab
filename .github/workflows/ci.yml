name: CI

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Octo.ServicePortal.slnx

      - name: Build
        run: dotnet build Octo.ServicePortal.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Octo.ServicePortal.slnx --configuration Release --no-build