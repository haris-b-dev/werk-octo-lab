on:
  push:
    branches:
      - main
      - release/**
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
      
      - name: Restore dependencies
        run: dotnet restore Octo.ServicePortal.slnx

      - name: Build solution
        run: dotnet build Octo.ServicePortal.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test Octo.ServicePortal.slnx --configuration Release --no-build --verbosity normal